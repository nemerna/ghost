apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  labels:
    app: ghost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost
  template:
    metadata:
      labels:
        app: ghost
    spec:
      serviceAccountName: ghost
      containers:
        # OAuth Proxy sidecar - handles authentication
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.14
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4180
              name: public
              protocol: TCP
          args:
            - --provider=openshift
            - --https-address=:4180
            - --http-address=
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session-secret
            - --openshift-service-account=ghost
            - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - --skip-auth-regex=^/(api/health|mcp/|mcp/github|mcp/reports)
            - --pass-user-headers=true
            - --pass-access-token=true
            - --email-domain=*
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: proxy-secret
              mountPath: /etc/proxy/secrets
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi

        # Frontend container - nginx serving static files and proxying API
        - name: frontend
          image: ghost-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi

        # Backend container - FastAPI REST API
        - name: backend
          image: ghost-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: api
              protocol: TCP
          env:
            - name: DEV_MODE
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ghost-postgres-secret
                  key: database-url
            - name: CORS_ORIGINS
              value: "*"
            # Comma-separated list of admin emails (synced on every login)
            - name: ADMIN_EMAILS
              value: ""
            # Comma-separated list of manager emails (synced on every login)
            - name: MANAGER_EMAILS
              value: ""
          envFrom:
            - configMapRef:
                name: ghost-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi

        # MCP Server container - MCP Streamable HTTP server for AI tool integration
        - name: mcp
          image: ghost-backend:latest
          imagePullPolicy: Always
          command: ["python", "-m", "ghost.server", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
              name: mcp
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ghost-postgres-secret
                  key: database-url
          envFrom:
            - configMapRef:
                name: ghost-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              cpu: 300m
              memory: 384Mi
            requests:
              cpu: 100m
              memory: 192Mi

      volumes:
        - name: proxy-tls
          secret:
            secretName: ghost-tls
        - name: proxy-secret
          secret:
            secretName: ghost-proxy-secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghost
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"ghost"}}'
