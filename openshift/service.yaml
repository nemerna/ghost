apiVersion: v1
kind: Service
metadata:
  name: jira-mcp
  labels:
    app: jira-mcp
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: jira-mcp-tls
spec:
  ports:
    - name: https
      port: 443
      targetPort: 4180
      protocol: TCP
  selector:
    app: jira-mcp
  type: ClusterIP
