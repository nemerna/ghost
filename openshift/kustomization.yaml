# Kustomization file for deploying Ghost to OpenShift
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jira-mcp

resources:
  - postgres.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml
  - configmap.yaml
  # Note: secrets.yaml is not included - create secrets manually or use sealed-secrets
  # Note: pvc.yaml removed - using PostgreSQL instead of SQLite

commonLabels:
  app.kubernetes.io/name: ghost
  app.kubernetes.io/part-of: ghost

# Customize images for your registry
images:
  - name: ghost-frontend
    newName: quay.io/nnaamneh/jira-mcp
    newTag: frontend
  - name: ghost-backend
    newName: quay.io/nnaamneh/jira-mcp
    newTag: backend
