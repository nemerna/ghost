# Template for secrets - DO NOT commit actual values to git
# Use `oc create secret` or a secrets manager
apiVersion: v1
kind: Secret
metadata:
  name: ghost-secrets
  labels:
    app: ghost
type: Opaque
stringData:
  # Database connection URL
  # For PostgreSQL: postgresql://user:password@host:5432/dbname
  # For SQLite (dev): sqlite:///app/data/ghost.db
  database-url: "sqlite:///app/data/ghost.db"
  
  # Jira Personal Access Token (optional - can be provided via MCP headers)
  # jira-token: "your-jira-pat"
  
  # GitHub Personal Access Token (optional - can be provided via MCP headers)
  # github-token: "your-github-pat"
---
apiVersion: v1
kind: Secret
metadata:
  name: ghost-proxy-secret
  labels:
    app: ghost
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  session-secret: "REPLACE_WITH_RANDOM_32_BYTE_BASE64_STRING"
