apiVersion: v1
kind: ConfigMap
metadata:
  name: ghost-config
  labels:
    app: ghost
data:
  # Jira Configuration (can also be set via headers in MCP mode)
  JIRA_SERVER_URL: ""
  JIRA_VERIFY_SSL: "true"
  
  # MCP Server Configuration
  MCP_SERVER_HOST: "0.0.0.0"
  MCP_SERVER_PORT: "8080"
  
  # GitHub Configuration (optional)
  GITHUB_API_URL: ""
  
  # Management Report Instructions (optional path to custom instructions file)
  # MANAGEMENT_REPORT_INSTRUCTIONS_FILE: "/app/config/management_report_instructions.md"
