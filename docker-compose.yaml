# Jira MCP Server - Full Deployment Stack
# 
# This docker-compose file provides two deployment options:
#   1. SQLite mode (default): Simple, file-based database
#   2. PostgreSQL mode: Production-ready with separate database container
#
# Usage:
#   SQLite mode:   docker-compose up jira-mcp
#   PostgreSQL:    docker-compose --profile postgres up
#
# Configuration:
#   Copy env.example to .env and configure your Jira credentials

services:
  # ===========================================
  # Jira MCP Server (with SQLite - default)
  # ===========================================
  jira-mcp:
    build:
      context: .
      dockerfile: Containerfile
    container_name: jira-mcp
    ports:
      - "8080:8080"
    environment:
      # Jira Configuration (required)
      - JIRA_SERVER_URL=${JIRA_SERVER_URL}
      - JIRA_PERSONAL_ACCESS_TOKEN=${JIRA_PERSONAL_ACCESS_TOKEN}
      - JIRA_VERIFY_SSL=${JIRA_VERIFY_SSL:-true}
      # Database - SQLite (default)
      - JIRA_MCP_DATA_DIR=/app/data
      # Leave DATABASE_URL empty for SQLite
      - DATABASE_URL=
    volumes:
      # Persistent storage for SQLite database
      - jira-mcp-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ===========================================
  # Jira MCP Server (with PostgreSQL)
  # ===========================================
  jira-mcp-postgres:
    build:
      context: .
      dockerfile: Containerfile
    container_name: jira-mcp-postgres
    profiles:
      - postgres
    ports:
      - "8080:8080"
    environment:
      # Jira Configuration (required)
      - JIRA_SERVER_URL=${JIRA_SERVER_URL}
      - JIRA_PERSONAL_ACCESS_TOKEN=${JIRA_PERSONAL_ACCESS_TOKEN}
      - JIRA_VERIFY_SSL=${JIRA_VERIFY_SSL:-true}
      # Database - PostgreSQL
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jira_mcp}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-jira_mcp}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ===========================================
  # PostgreSQL Database (optional)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: jira-mcp-postgres-db
    profiles:
      - postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-jira_mcp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-jira_mcp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jira_mcp} -d ${POSTGRES_DB:-jira_mcp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

# ===========================================
# Persistent Volumes
# ===========================================
volumes:
  # SQLite data volume
  jira-mcp-data:
    driver: local
  # PostgreSQL data volume
  postgres-data:
    driver: local
